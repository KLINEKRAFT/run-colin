<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classic City Runner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        /* Modern CSS reset for mobile */
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        
        body { margin: 0; padding: 0; background: #0b0c10; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }

        canvas { background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); /* Maintain aspect ratio (720/1280) */
            aspect-ratio: 720 / 1280; 
            
            /* Responsive sizing: Maximize area within screen */
            max-width: 100%; max-height: 100%; width: auto; height: auto; 
            
            /* Prevent unwanted gestures */
            touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body>
    <canvas id="game" width="720" height="1280"></canvas>
    <script src="game.js"></script>
</body>
</html>
